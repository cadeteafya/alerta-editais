name: Monitor de Editais de Residência Médica

on:
  schedule:
    # Seg a Sex: a cada 30 min das 08:00 às 18:00 (BRT) -> 11:00 às 21:00 (UTC)
    - cron: '*/30 11-21 * * 1-5'
    # Sáb e Dom: única vez às 13:00 (BRT) -> 16:00 (UTC)
    - cron: '0 16 * * 0,6'
  workflow_dispatch: # Permite execução manual direta do github!

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Monitor
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      run: python src/main.py

    - name: Commit state changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/last_seen.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update last_seen.json state" && git push)
